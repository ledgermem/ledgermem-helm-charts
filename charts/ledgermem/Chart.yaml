apiVersion: v2
name: getmnemo
description: Self-hosted Mnemo Memory — long-term memory infrastructure for AI agents.
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://getmnemo.xyz
sources:
  - https://github.com/getmnemo/getmnemo-helm-charts
  - https://github.com/getmnemo/getmnemo-enterprise
keywords:
  - memory
  - llm
  - agents
  - rag
  - vector
maintainers:
  - name: Mnemo
    email: founders@getmnemo.xyz
icon: https://getmnemo.xyz/og/index.svg
dependencies:
  - name: postgresql
    version: 15.5.27
    repository: https://charts.bitnami.com/bitnami
    condition: postgres.enabled
  - name: redis
    version: 19.6.4
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
