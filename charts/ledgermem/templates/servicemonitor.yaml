{{- if .Values.monitoring.serviceMonitor -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ledgermem.fullname" . }}
  labels:
    {{- include "ledgermem.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "ledgermem.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
