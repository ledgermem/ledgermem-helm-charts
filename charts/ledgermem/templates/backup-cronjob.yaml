{{- if .Values.backup.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "getmnemo.fullname" . }}-backup
  labels:
    {{- include "getmnemo.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: "{{ .Values.backup.image.repository | default "ghcr.io/getmnemo/backup" }}:{{ .Values.backup.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits:   { cpu: 1,    memory: 1Gi }
              args:
                - snapshot
                - --to
                # Include timestamp + random suffix so concurrent / retried runs
                # never overwrite a prior backup at the same date prefix.
                - "s3://{{ .Values.backup.s3.bucket }}/$(date -u +%Y/%m/%d/%H%M%S)-${HOSTNAME}/"
              env:
                - name: AWS_REGION
                  value: {{ .Values.backup.s3.region | quote }}
                {{- if .Values.backup.s3.endpoint }}
                - name: AWS_ENDPOINT_URL
                  value: {{ .Values.backup.s3.endpoint | quote }}
                {{- end }}
                {{- if .Values.backup.s3.accessKeySecretRef.name }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3.accessKeySecretRef.name }}
                      key: access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3.accessKeySecretRef.name }}
                      key: secret-access-key
                {{- end }}
                - name: DATABASE_URL
                  value: {{ include "getmnemo.databaseUri" . | quote }}
{{- end }}
