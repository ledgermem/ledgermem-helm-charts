{{- if .Values.apiKey.create -}}
{{- /*
  Preserve the existing api-key across `helm upgrade` so client integrations
  do not break on every chart update. Only generate a new value if no Secret
  exists yet.
*/ -}}
{{- $secretName := printf "%s-api-key" (include "getmnemo.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $apiKey := "" -}}
{{- if and $existing $existing.data (hasKey $existing.data "api-key") -}}
{{- $apiKey = index $existing.data "api-key" | b64dec -}}
{{- else -}}
{{- $apiKey = randAlphaNum 40 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "getmnemo.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ $apiKey | quote }}
{{- end }}
{{- if .Values.licenseKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "getmnemo.fullname" . }}-license
  labels:
    {{- include "getmnemo.labels" . | nindent 4 }}
type: Opaque
stringData:
  license: {{ .Values.licenseKey | quote }}
{{- end }}
