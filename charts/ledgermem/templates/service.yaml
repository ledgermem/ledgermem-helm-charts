apiVersion: v1
kind: Service
metadata:
  name: {{ include "getmnemo.fullname" . }}-api
  labels:
    {{- include "getmnemo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "getmnemo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
